<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çağdaş PetShop v4.2 COMPLETE</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; overflow: hidden; }
        .container { display: flex; flex-direction: column; width: 100%; height: 100vh; }
        .header { padding: 12px; color: white; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .content { flex: 1; overflow-y: auto; padding: 12px; }
        .menu-toggle, .drawer-close { display: inline-flex; align-items: center; justify-content: center; width: 42px; height: 42px; border: 1px solid rgba(255,255,255,0.3); border-radius: 12px; background: rgba(255,255,255,0.14); color: white; cursor: pointer; transition: transform 0.2s ease, background 0.2s ease; }
        .menu-toggle:hover, .menu-toggle:focus-visible { background: rgba(255,255,255,0.24); transform: translateY(-1px); }
        .menu-toggle:focus-visible, .drawer-close:focus-visible, .drawer-nav-item:focus-visible { outline: 3px solid rgba(255,255,255,0.45); outline-offset: 2px; }
        .drawer-layer { position: fixed; inset: 0; z-index: 1200; visibility: hidden; pointer-events: none; }
        .drawer-layer.open { visibility: visible; pointer-events: auto; }
        .drawer-backdrop { position: absolute; inset: 0; background: rgba(15, 12, 24, 0.55); opacity: 0; transition: opacity 0.28s ease; backdrop-filter: blur(3px); }
        .drawer-layer.open .drawer-backdrop { opacity: 1; }
        .drawer { position: absolute; top: 0; right: 0; display: flex; flex-direction: column; width: min(88vw, 360px); height: 100%; height: 100dvh; transform: translateX(100%); transition: transform 0.3s cubic-bezier(.22,.8,.22,1); box-shadow: -18px 0 45px rgba(15, 12, 24, 0.24); overflow: hidden; }
        .drawer-layer.open .drawer { transform: translateX(0); }
        .drawer-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: max(18px, env(safe-area-inset-top)) 18px 16px; border-bottom: 1px solid; }
        .drawer-user { min-width: 0; }
        .drawer-title { font-size: 16px; font-weight: 800; letter-spacing: 0.01em; }
        .drawer-subtitle { margin-top: 4px; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .drawer-close { flex: 0 0 auto; width: 38px; height: 38px; background: transparent; }
        .drawer-nav { flex: 1; overflow-y: auto; overscroll-behavior: contain; padding: 12px 12px max(18px, env(safe-area-inset-bottom)); }
        .drawer-nav-item { width: 100%; display: grid; grid-template-columns: 38px minmax(0, 1fr) auto; align-items: center; gap: 10px; min-height: 48px; margin-bottom: 5px; padding: 7px 10px; border: 1px solid transparent; border-radius: 12px; background: transparent; text-align: left; cursor: pointer; transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease; }
        .drawer-nav-item:hover { transform: translateX(-2px); }
        .drawer-icon { display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 10px; }
        .drawer-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; font-weight: 700; }
        .drawer-indicator { width: 7px; height: 7px; border-radius: 50%; opacity: 0; }
        .drawer-nav-item.active .drawer-indicator { opacity: 1; }
        body.drawer-open { overflow: hidden; }
        @media (max-width: 420px) {
            .header { padding: 10px 12px; }
            .drawer { width: min(92vw, 340px); }
            .drawer-header { padding-left: 14px; padding-right: 14px; }
            .drawer-nav { padding-left: 9px; padding-right: 9px; }
        }
        @media (prefers-reduced-motion: reduce) {
            .drawer, .drawer-backdrop, .menu-toggle, .drawer-nav-item { transition: none; }
        }
        .card { border-radius: 8px; padding: 12px; margin-bottom: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        .button { padding: 8px 12px; border-radius: 6px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 11px; margin: 4px; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .input-group { margin-bottom: 8px; }
        .input-group input, .input-group select, .input-group textarea { width: 100%; padding: 6px; border-radius: 4px; border: 1px solid; font-size: 11px; font-family: inherit; }
        .table { width: 100%; border-collapse: collapse; font-size: 10px; }
        .table th { text-align: left; padding: 6px; border-bottom: 2px solid; font-weight: bold; }
        .table td { padding: 6px; border-bottom: 1px solid; }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 12px; max-width: 550px; width: 90%; max-height: 85vh; overflow-y: auto; }
        .modal-header { padding: 12px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .modal-body { padding: 12px; }
        .hidden { display: none; }
        .camera-container { border: 3px solid; padding: 12px; border-radius: 8px; margin-bottom: 12px; }
        .camera-video { width: 100%; border-radius: 6px; background: black; height: 200px; object-fit: cover; margin-bottom: 8px; display: block; }
        .camera-result { padding: 8px; border-radius: 4px; text-align: center; font-size: 12px; font-weight: bold; min-height: 40px; display: flex; align-items: center; justify-content: center; }
        .tab-buttons { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
        .tab-btn { padding: 6px 10px; border-radius: 4px; border: 1px solid; background: transparent; cursor: pointer; font-size: 10px; font-weight: bold; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 3px; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // ========== THEME SYSTEM ==========
        const themes = {
            purple: { name: '🟣 Mor', primary: '#9333ea', background: '#f9f5ff', card: '#ffffff', text: '#1f2937', textLight: '#6b7280', success: '#10b981', error: '#ef4444', warning: '#f59e0b', info: '#3b82f6' },
            blue: { name: '🔵 Mavi', primary: '#3b82f6', background: '#f0f9ff', card: '#ffffff', text: '#1f2937', textLight: '#6b7280', success: '#10b981', error: '#ef4444', warning: '#f59e0b', info: '#3b82f6' },
            green: { name: '🟢 Yeşil', primary: '#10b981', background: '#f0fdf4', card: '#ffffff', text: '#1f2937', textLight: '#6b7280', success: '#10b981', error: '#ef4444', warning: '#f59e0b', info: '#3b82f6' },
            dark: { name: '🌙 Koyu', primary: '#6366f1', background: '#1f2937', card: '#374151', text: '#f3f4f6', textLight: '#d1d5db', success: '#10b981', error: '#ef4444', warning: '#f59e0b', info: '#60a5fa' },
            red: { name: '🔴 Kırmızı', primary: '#dc2626', background: '#fef2f2', card: '#ffffff', text: '#1f2937', textLight: '#6b7280', success: '#10b981', error: '#ef4444', warning: '#f59e0b', info: '#3b82f6' }
        };

        let theme = themes.purple;

        // ========== GLOBAL CAMERA MANAGER ==========
        let activeCameraStream = null;
        let activeScanInterval = null;

        function stopActiveCamera() {
            if (activeScanInterval) clearInterval(activeScanInterval);
            if (activeCameraStream) {
                activeCameraStream.getTracks().forEach(track => track.stop());
                activeCameraStream = null;
            }
        }

        async function startCameraScanning(videoElementId, resultElementId, onScanned) {
            try {
                stopActiveCamera();
                
                const videoElem = document.getElementById(videoElementId);
                if (!videoElem) return;

                activeCameraStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                
                videoElem.srcObject = activeCameraStream;
                videoElem.play();

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const resultElem = document.getElementById(resultElementId);
                let lastCode = null;

                activeScanInterval = setInterval(() => {
                    try {
                        if (videoElem.readyState === videoElem.HAVE_ENOUGH_DATA) {
                            canvas.width = videoElem.videoWidth;
                            canvas.height = videoElem.videoHeight;
                            ctx.drawImage(videoElem, 0, 0);

                            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                            const code = jsQR(imageData.data, imageData.width, imageData.height);

                            if (code && code.data !== lastCode) {
                                lastCode = code.data;
                                onScanned(code.data, resultElem);
                            }
                        }
                    } catch (err) {
                        console.error('Kamera tarama hatası:', err);
                    }
                }, 250);

            } catch (err) {
                alert('⚠️ Kamera erişimi reddedildi!');
                console.error('Kamera hatası:', err);
            }
        }
        try { const saved = localStorage.getItem('theme'); if (saved && themes[saved]) theme = themes[saved]; } catch(e) {}

        // ========== STATE ==========
        let state = {
            screen: 'login',
            user: null,
            users: [
                { id: 1, username: 'admin', password: 'admin123', role: 'admin', name: 'Yönetici', email: 'admin@cagdas.com', phone: '05001234567' },
                { id: 2, username: 'kasa1', password: 'kasa123', role: 'cashier', name: 'Kasa', email: 'kasa@cagdas.com', phone: '05002345678' }
            ],
            products: [
                { id: 1, name: 'Köpek Maması 10kg', sku: 'DOG001', barcode: '8680000000001', category: 'Mama', buyPrice: 150, sellPrice: 250, shop: 20, warehouse: 50, emoji: '🐕', image64: null },
                { id: 2, name: 'Kedi Konservesi 400g', sku: 'CAT001', barcode: '8680000000002', category: 'Mama', buyPrice: 20, sellPrice: 45, shop: 15, warehouse: 30, emoji: '🐈', image64: null },
                { id: 3, name: 'Köpek Oyuncağı', sku: 'TOY001', barcode: '8680000000003', category: 'Oyuncak', buyPrice: 30, sellPrice: 60, shop: 10, warehouse: 25, emoji: '🎾', image64: null }
            ],
            customers: [],
            suppliers: [],
            sales: [],
            expenses: [],
            returns: [],
            cart: [],
            debts: [],
            stockLog: [],
            cashLog: [],
            notifications: []
        };

        // Load data
        try {
            const saved = localStorage.getItem('cagdas');
            if (saved) Object.assign(state, JSON.parse(saved));
        } catch(e) {}

        // Guard against corrupted/incompatible saved data breaking list rendering
        ['products', 'customers', 'suppliers', 'sales', 'expenses', 'returns', 'cart', 'debts', 'stockLog', 'cashLog', 'notifications', 'users'].forEach(key => {
            if (!Array.isArray(state[key])) state[key] = [];
        });
        if (state.users.length === 0) {
            state.users = [
                { id: 1, username: 'admin', password: 'admin123', role: 'admin', name: 'Yönetici', email: 'admin@cagdas.com', phone: '05001234567' },
                { id: 2, username: 'kasa1', password: 'kasa123', role: 'cashier', name: 'Kasa', email: 'kasa@cagdas.com', phone: '05002345678' }
            ];
        }

        function saveData() {
            try { localStorage.setItem('cagdas', JSON.stringify(state)); } catch(e) {}
        }

        // ========== RENDER ==========
        function render() {
            const app = document.getElementById('app');
            if (!state.user) renderLogin();
            else renderApp();
        }

        function renderLogin() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background: ${theme.background}; padding: 20px;">
                    <div style="font-size: 50px; margin-bottom: 20px;">🐾</div>
                    <div style="max-width: 350px; width: 100%; background: ${theme.card}; padding: 20px; border-radius: 12px; border-top: 4px solid ${theme.primary};">
                        <h2 style="font-size: 20px; font-weight: bold; margin-bottom: 15px; color: ${theme.primary};">Çağdaş PetShop v4.2</h2>
                        <input id="username" placeholder="Kullanıcı Adı" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid ${theme.primary}; margin-bottom: 10px; font-size: 14px;" />
                        <input id="password" type="password" placeholder="Şifre" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid ${theme.primary}; margin-bottom: 15px; font-size: 14px;" onkeypress="if(event.key==='Enter') login()" />
                        <button onclick="login()" style="width: 100%; padding: 10px; background: ${theme.primary}; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px;">Giriş</button>
                        <div style="background: ${theme.primary}10; padding: 10px; border-radius: 6px; margin-top: 15px; font-size: 12px; color: ${theme.text};">
                            <strong>Demo:</strong><br>👨‍💼 admin/admin123<br>💰 kasa1/kasa123
                        </div>
                    </div>
                </div>
            `;
            window.login = function() {
                const u = document.getElementById('username').value;
                const p = document.getElementById('password').value;
                const user = state.users.find(x => x.username === u && x.password === p);
                if (user) {
                    state.user = user;
                    try {
                        render();
                    } catch (err) {
                        console.error(err);
                        state.user = null;
                        alert('⚠️ Giriş sırasında bir hata oluştu, tekrar deneyin.');
                        renderLogin();
                    }
                } else {
                    alert('❌ Yanlış!');
                }
            };
        }

        function renderApp() {
            const navItems = state.user.role === 'admin' 
                ? ['dashboard','pos','inventory','customers','suppliers','expenses','returns','debts','charts','period','stock','cash','users','notifications','theme','qr','barcode','image','backup','logout']
                : ['dashboard','pos','debts','logout'];

            const navIcons = { dashboard: '🏠', pos: '💳', inventory: '📦', customers: '👥', suppliers: '🚚', expenses: '💸', returns: '↩️', debts: '💰', charts: '📊', period: '📋', stock: '📋', cash: '🏧', users: '👤', notifications: '🔔', theme: '🎨', qr: '🔳', barcode: '📦', image: '📸', backup: '💾', logout: '🚪' };
            const navNames = { dashboard: 'Panel', pos: 'Kasa', inventory: 'Envanter', customers: 'Müşteri', suppliers: 'Tedarikçi', expenses: 'Gider', returns: 'İade', debts: 'Borç', charts: 'Grafik', period: 'Dönem', stock: 'Stok', cash: 'Kasa', users: 'Kullanıcı', notifications: 'Bildir', theme: 'Tema', qr: 'QR', barcode: 'Barcode', image: 'Foto', backup: 'Yedek', logout: 'Çıkış' };

            const app = document.getElementById('app');
            app.innerHTML = `
                <div style="display: flex; flex-direction: column; height: 100vh; background: ${theme.background}; color: ${theme.text};">
                    <div class="header" style="background: ${theme.primary};">
                        <div><div style="font-size: 18px; font-weight: bold;">🐾 Çağdaş PetShop</div><div style="font-size: 11px; opacity: 0.8;">${state.user.name}</div></div>
                        <button class="menu-toggle" type="button" onclick="openDrawer()" aria-label="Menüyü aç" aria-controls="app-drawer" aria-expanded="false">
                            <svg width="23" height="23" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                        </button>
                    </div>
                    <div id="screen" style="flex: 1; overflow-y: auto; padding: 12px;"></div>
                    <div id="drawer-layer" class="drawer-layer" aria-hidden="true">
                        <div class="drawer-backdrop" onclick="closeDrawer()" aria-hidden="true"></div>
                        <aside id="app-drawer" class="drawer" role="dialog" aria-modal="true" aria-label="Uygulama menüsü" style="background: ${theme.card}; color: ${theme.text};">
                            <div class="drawer-header" style="border-color: ${theme.primary}30;">
                                <div class="drawer-user">
                                    <div class="drawer-title" style="color: ${theme.primary};">Uygulama Menüsü</div>
                                    <div class="drawer-subtitle" style="color: ${theme.textLight};">${state.user.name} · ${state.user.role === 'admin' ? 'Yönetici' : 'Kasa'}</div>
                                </div>
                                <button class="drawer-close" type="button" onclick="closeDrawer()" aria-label="Menüyü kapat" style="border-color: ${theme.primary}35; color: ${theme.text};">
                                    <svg width="21" height="21" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m6 6 12 12M18 6 6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                                </button>
                            </div>
                            <nav class="drawer-nav" aria-label="Ana menü">
                                ${navItems.map(item => {
                                    const isActive = state.screen === item;
                                    return `<button class="drawer-nav-item${isActive ? ' active' : ''}" type="button" onclick="selectDrawerItem('${item}')" style="background: ${isActive ? theme.primary + '18' : 'transparent'}; border-color: ${isActive ? theme.primary + '45' : 'transparent'}; color: ${isActive ? theme.primary : theme.text};" ${isActive ? 'aria-current="page"' : ''}>
                                        <span class="drawer-icon" style="background: ${isActive ? theme.primary + '22' : theme.background}; color: ${isActive ? theme.primary : theme.textLight}; font-size: 18px;">${navIcons[item]}</span>
                                        <span class="drawer-label">${navNames[item]}</span>
                                        <span class="drawer-indicator" style="background: ${theme.primary};"></span>
                                    </button>`;
                                }).join('')}
                            </nav>
                        </aside>
                    </div>
                </div>
            `;
            renderScreen();
        }

        let drawerPreviousFocus = null;

        function openDrawer() {
            const layer = document.getElementById('drawer-layer');
            const toggle = document.querySelector('.menu-toggle');
            if (!layer) return;
            drawerPreviousFocus = document.activeElement;
            layer.classList.add('open');
            layer.setAttribute('aria-hidden', 'false');
            document.body.classList.add('drawer-open');
            if (toggle) toggle.setAttribute('aria-expanded', 'true');
            requestAnimationFrame(() => layer.querySelector('.drawer-close')?.focus());
        }

        function closeDrawer() {
            const layer = document.getElementById('drawer-layer');
            const toggle = document.querySelector('.menu-toggle');
            if (!layer) return;
            layer.classList.remove('open');
            layer.setAttribute('aria-hidden', 'true');
            document.body.classList.remove('drawer-open');
            if (toggle) toggle.setAttribute('aria-expanded', 'false');
            if (drawerPreviousFocus && document.contains(drawerPreviousFocus)) drawerPreviousFocus.focus();
            drawerPreviousFocus = null;
        }

        function selectDrawerItem(item) {
            closeDrawer();
            switchScreen(item);
        }

        document.addEventListener('keydown', function(event) {
            const layer = document.getElementById('drawer-layer');
            if (!layer || !layer.classList.contains('open')) return;
            if (event.key === 'Escape') closeDrawer();
            if (event.key === 'Tab') {
                const focusable = [...layer.querySelectorAll('button:not([disabled])')];
                if (!focusable.length) return;
                const first = focusable[0];
                const last = focusable[focusable.length - 1];
                if (event.shiftKey && document.activeElement === first) { event.preventDefault(); last.focus(); }
                else if (!event.shiftKey && document.activeElement === last) { event.preventDefault(); first.focus(); }
            }
        });

        function switchScreen(screen) {
            if (screen === 'logout') { state.user = null; render(); } else { state.screen = screen; render(); }
        }

        function renderScreen() {
            const screen = document.getElementById('screen');
            const charts = () => state.sales.length > 0;

            try {
                switch(state.screen) {
                    case 'dashboard': renderDashboard(screen); break;
                    case 'pos': renderPOS(screen); break;
                    case 'inventory': renderInventory(screen); break;
                    case 'customers': renderCustomers(screen); break;
                    case 'suppliers': renderSuppliers(screen); break;
                    case 'expenses': renderExpenses(screen); break;
                    case 'returns': renderReturns(screen); break;
                    case 'debts': renderDebts(screen); break;
                    case 'charts': renderCharts(screen); break;
                    case 'period': renderPeriod(screen); break;
                    case 'stock': if(state.user.role === 'admin') renderStockLog(screen); else renderDashboard(screen); break;
                    case 'cash': if(state.user.role === 'admin') renderCashManagement(screen); else renderDashboard(screen); break;
                    case 'users': if(state.user.role === 'admin') renderUsers(screen); else renderDashboard(screen); break;
                    case 'notifications': if(state.user.role === 'admin') renderNotifications(screen); else renderDashboard(screen); break;
                    case 'theme': renderTheme(screen); break;
                    case 'qr': if(state.user.role === 'admin') renderQR(screen); else renderDashboard(screen); break;
                    case 'barcode': if(state.user.role === 'admin') renderBarcode(screen); else renderDashboard(screen); break;
                    case 'image': if(state.user.role === 'admin') renderImage(screen); else renderDashboard(screen); break;
                    case 'backup': if(state.user.role === 'admin') renderBackup(screen); else renderDashboard(screen); break;
                    default: state.screen = 'dashboard'; renderDashboard(screen);
                }
            } catch (err) {
                console.error(err);
                screen.innerHTML = `
                    <div class="card" style="border-left: 3px solid ${theme.error}; text-align: center;">
                        <div style="font-size: 13px; font-weight: bold; color: ${theme.error}; margin-bottom: 8px;">⚠️ Bu ekran yüklenirken bir hata oluştu</div>
                        <button onclick="state.screen='dashboard'; renderScreen();" style="padding: 8px 12px; background: ${theme.primary}; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 11px;">🏠 Panele Dön</button>
                    </div>
                `;
            }
        }

        // ========== DASHBOARD ==========
        function renderDashboard(screen) {
            const totalSales = state.sales.reduce((s, a) => s + (a.total || 0), 0);
            const totalExpenses = state.expenses.reduce((s, a) => s + (a.amount || 0), 0);
            const returnedAmount = state.returns.reduce((s, a) => s + (a.amount || 0), 0);
            const profit = totalSales - totalExpenses - returnedAmount;
            const totalDebt = state.debts.reduce((s, a) => s + (a.amount - (a.paid || 0)), 0);
            
            screen.innerHTML = `
                <div class="grid-2" style="margin-bottom: 12px;">
                    <div class="card" style="border-left: 3px solid ${theme.success};">
                        <div style="font-size: 10px; color: ${theme.textLight};">💰 Satış</div>
                        <div style="font-size: 16px; font-weight: bold; color: ${theme.success}; margin-top: 4px;">${totalSales.toFixed(0)}₺</div>
                    </div>

                const sale = {

                    invoiceNo: 'INV-' + Date.now().toString().slice(-6),
                    items: [...state.cart],
                    total: state.cart.reduce((s, a) => s + (a.sellPrice * a.qty), 0),

                    customer: customer ? customer.name : 'Peçin Alıcı',
                    customerId: customerId,
                    timestamp: new Date().toLocaleString('tr-TR'),
                    cashier: state.user.name
                };

                state.sales.push(sale);
                state.cart.forEach(c => {

                        p.shop -= c.qty;
                        state.stockLog.push({

                p.name = document.getElementById('edit-product-name').value;

                p.buyPrice = parseFloat(document.getElementById('edit-product-buy').value) || 0;

                p.shop = parseFloat(document.getElementById('edit-product-shop').value) || 0;
                p.warehouse = parseFloat(document.getElementById('edit-product-warehouse').value) || 0;
                saveData();
                closeProductEdit();
                renderInventory(screen);
                alert('✅ Ürün düzenlendi!');
            };

            window.transferStock = function() {
                const amount = parseFloat(document.getElementById('edit-product-transfer').value);
                const id = parseInt(document.getElementById('edit-product-id').value);
                const p = state.products.find(x => x.id === id);
                if (!p) return;
                if (!amount || amount <= 0) { alert('Geçerli miktar girin!'); return; }
                if (p.warehouse < amount) { alert('Depo stok yetersiz!'); return; }
                p.warehouse -= amount;
                p.shop += amount;
                saveData();
                document.getElementById('edit-product-transfer').value = '';
                alert(`✅ ${amount} adet transfer edildi!`);
                renderInventory(screen);
            };

                document.getElementById('product-edit-form').classList.add('hidden');

        // ========== DÖNEM RAPORU ==========
        function renderPeriod(screen) {
            const now = new Date();
            let month = now.getMonth() + 1, year = now.getFullYear();

            screen.innerHTML = `
                <div class="grid-2" style="margin-bottom: 12px;">
                    <div>
                        <label style="font-size: 10px; font-weight: bold;">Ay</label>
                        <select id="p-month" style="width: 100%; padding: 6px; border-radius: 4px; border: 1px solid ${theme.primary}; font-size: 11px;">
                            ${Array.from({length: 12}, (_, i) => `<option value="${i+1}" ${i+1 === month ? 'selected' : ''}>${i+1}</option>`).join('')}
                        </select>
                    </div>
                    <div>
                        <label style="font-size: 10px; font-weight: bold;">Yıl</label>
                        <select id="p-year" style="width: 100%; padding: 6px; border-radius: 4px; border: 1px solid ${theme.primary}; font-size: 11px;">
                            ${Array.from({length: 5}, (_, i) => {
                                const y = new Date().getFullYear() - i;
                                return `<option value="${y}" ${y === year ? 'selected' : ''}>${y}</option>`;
                            }).join('')}
                        </select>
                    </div>
                </div>
                <div id="period-content"></div>
            `;

            function updatePeriod() {
                const m = parseInt(document.getElementById('p-month').value);
                const y = parseInt(document.getElementById('p-year').value);

                const filtered = state.sales.filter(s => {
                    try {
                        const d = new Date(s.timestamp);
                        return d.getMonth() + 1 === m && d.getFullYear() === y;
                    } catch { return true; }
                });

                const revenue = filtered.reduce((s, a) => s + (a.total || 0), 0);
                
                // Giderleri ay/yıla göre filtrele
                const expenseFiltered = state.expenses.filter(e => {
                    try {
                        const d = new Date(e.timestamp || e.date || 0);
                        return d.getMonth() + 1 === m && d.getFullYear() === y;
                    } catch { return false; }
                });
                const expense = expenseFiltered.reduce((s, a) => s + (a.amount || 0), 0);
                
                // İadeleri hesapla
                const returnsFiltered = state.returns.filter(r => {
                    try {
                        const d = new Date(r.timestamp || r.date || 0);
                        return d.getMonth() + 1 === m && d.getFullYear() === y;
                    } catch { return false; }
                });
                const returns = returnsFiltered.reduce((s, a) => s + (a.amount || 0), 0);
                
                // Kar = Satış - Gider - İade
                const profit = revenue - expense - returns;
                
                // Borçlar (bu ayın değil, toplam)
                const debts = state.debts.reduce((s, a) => s + (a.amount - (a.paid || 0)), 0);

                document.getElementById('period-content').innerHTML = `
                    <div class="grid-2" style="margin-bottom: 12px;">
                        <div class="card" style="border-left: 3px solid ${theme.success}; text-align: center;">
                            <div style="font-size: 10px; color: ${theme.textLight};">💰 Satış</div>
                            <div style="font-size: 16px; font-weight: bold; color: ${theme.success}; margin-top: 5px;">${revenue.toFixed(0)}₺</div>
                        </div>
                        <div class="card" style="border-left: 3px solid ${theme.error}; text-align: center;">
                            <div style="font-size: 10px; color: ${theme.textLight};">💸 Gider</div>
                            <div style="font-size: 16px; font-weight: bold; color: ${theme.error}; margin-top: 5px;">${expense.toFixed(0)}₺</div>
                        </div>
                        <div class="card" style="border-left: 3px solid #FF9800; text-align: center;">
                            <div style="font-size: 10px; color: ${theme.textLight};">↩️ İade</div>
                            <div style="font-size: 16px; font-weight: bold; color: #FF9800; margin-top: 5px;">${returns.toFixed(0)}₺</div>
                        </div>
                        <div class="card" style="border-left: 3px solid ${debts > 0 ? theme.warning : theme.success}; text-align: center;">
                            <div style="font-size: 10px; color: ${theme.textLight};">🔗 Borçlar</div>
                            <div style="font-size: 16px; font-weight: bold; color: ${debts > 0 ? theme.warning : theme.success}; margin-top: 5px;">${debts.toFixed(0)}₺</div>
                        </div>
                        <div class="card" style="border-left: 3px solid ${profit > 0 ? theme.success : theme.error}; text-align: center; grid-column: 1/-1;">
                            <div style="font-size: 10px; color: ${theme.textLight};">📊 Kar/Zarar</div>
                            <div style="font-size: 18px; font-weight: bold; color: ${profit > 0 ? theme.success : theme.error}; margin-top: 5px;">${profit.toFixed(0)}₺ (${(revenue > 0 ? ((profit/revenue)*100).toFixed(1) : 0)}%)</div>
                        </div>
                    </div>
                `;
            }

            document.getElementById('p-month').onchange = updatePeriod;
            document.getElementById('p-year').onchange = updatePeriod;
            updatePeriod();
        }

        // ========== KULLANICI YÖNETİMİ ==========
        function renderUsers(screen) {
            screen.innerHTML = `
                <div style="margin-bottom: 12px;">
                    <button onclick="toggleUserForm()" style="width: 100%; padding: 10px; background: ${theme.primary}; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px;">➕ Kullanıcı Ekle</button>
                </div>

                <div id="user-form" class="hidden" style="background: ${theme.card}; padding: 12px; border-radius: 6px; margin-bottom: 12px; border-left: 3px solid ${theme.primary};">
                    <input id="user-username" placeholder="Kullanıcı Adı" style="width: 100%; padding: 6px; border-radius: 4px; border: 1px solid ${theme.primary}; margin-bottom: 6px; font-size: 11px;" />
                    <input id="user-password" placeholder="Şifre" style="width: 100%; padding: 6px; border-radius: 4px; border: 1px solid ${theme.primary}; margin-bottom: 6px; font-size: 11px;" />
                    <input id="user-name" placeholder="Ad/Soyad" style="width: 100%; padding: 6px; border-radius: 4px; border: 1px solid ${theme.primary}; margin-bottom: 6px; font-size: 11px;" />
                    <input id="user-phone" placeholder="Telefon (05XXXXXXXXX)" style="width: 100%; padding: 6px; border-radius: 4px; border: 1px solid ${theme.primary}; margin-bottom: 6px; font-size: 11px;" />
                    <input id="user-email" placeholder="E-Posta (email@example.com)" type="email" style="width: 100%; padding: 6px; border-radius: 4px; border: 1px solid ${theme.primary}; margin-bottom: 6px; font-size: 11px;" />
                    <select id="user-role" style="width: 100%; padding: 6px; border-radius: 4px; border: 1px solid ${theme.primary}; margin-bottom: 8px; font-size: 11px;">
                        <option value="cashier">💰 Kasa</option><option value="admin">🔑 Yönetici</option>
                    </select>
                    <button onclick="saveUser()" style="width: 100%; padding: 6px; background: ${theme.success}; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 11px;">✅ Kaydet</button>
                </div>

                <div id="users-list"></div>
            `;

            window.toggleUserForm = function() {
                document.getElementById('user-form').classList.toggle('hidden');
            };

            window.saveUser = function() {
                const u = {
                    id: Date.now(),
                    username: document.getElementById('user-username').value,
                    password: document.getElementById('user-password').value,
                    name: document.getElementById('user-name').value,
                    phone: document.getElementById('user-phone').value || '',
                    email: document.getElementById('user-email').value || '',
                    role: document.getElementById('user-role').value
                };
                state.users.push(u);
                saveData();
                renderUsers(screen);
                alert('✅ Kullanıcı eklendi!');
            };

            const list = document.getElementById('users-list');
            list.innerHTML = state.users.map(u => `
                <div style="background: ${theme.card}; padding: 10px; border-radius: 6px; border-left: 3px solid ${u.role === 'admin' ? theme.primary : theme.warning}; margin-bottom: 8px;">
                    <div style="font-weight: bold; color: ${theme.primary};">${u.name} ${u.role === 'admin' ? '🔑' : '💰'}</div>
                    <div style="font-size: 9px; color: ${theme.textLight};">👤 ${u.username}</div>
                    <button onclick="deleteUser(${u.id})" style="width: 100%; padding: 4px; background: ${theme.error}20; color: ${theme.error}; border: none; border-radius: 3px; cursor: pointer; font-size: 9px; margin-top: 6px;">🗑️ Sil</button>
                </div>
            `).join('');

            window.deleteUser = function(id) {
                if (state.users.length === 1) { alert('⚠️ En az bir kullanıcı gerekli!'); return; }
                state.users = state.users.filter(x => x.id !== id);
                saveData();
                renderUsers(screen);
            };
        }

        // ========== QR YAZDIRMA ==========
        function renderQR(screen) {
            screen.innerHTML = `
                <div class="card" style="border-left: 3px solid ${theme.success};">
                    <div style="font-size: 12px; font-weight: bold; color: ${theme.success}; margin-bottom: 8px;">🔳 QR Katalog</div>
                    <button onclick="printQR()" style="width: 100%; padding: 8px; background: ${theme.success}; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px;">🖨️ QR Yazdır</button>
                </div>
            `;

            window.printQR = function() {
                const w = window.open('', 'QR');
                w.document.write(`<html><head><style>.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;}.item{text-align:center;}.item img{width:120px;}</style></head><body><h1>🐾 QR Kataloğu</h1><div class="grid">${state.products.map(p => `<div class="item"><img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${encodeURIComponent(JSON.stringify({type:'product',id:p.id,name:p.name,price:p.sellPrice}))}" /><div>${p.name}</div><div>${p.sellPrice}₺</div></div>`).join('')}</div></body></html>`);
                w.document.close();
                setTimeout(() => w.print(), 500);
            };
        }

        // ========== BARKOD YAZDIRMA ==========
        function renderBarcode(screen) {
            screen.innerHTML = `
                <div class="card" style="border-left: 3px solid ${theme.success};">
                    <div style="font-size: 12px; font-weight: bold; color: ${theme.success}; margin-bottom: 8px;">📦 Barkod Yazdır</div>
                    <button onclick="printBarcode()" style="width: 100%; padding: 8px; background: ${theme.success}; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px;">🖨️ Barkod Yazdır</button>
                </div>
            `;

            window.printBarcode = function() {
                const w = window.open('', 'Barcode');
                w.document.write(`<html><head><script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"><\/script><style>.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;}.item{text-align:center;}</style></head><body><h1>🐾 Barkodlar</h1><div class="grid">${state.products.map((p,i) => `<div class="item"><svg id="barcode${i}"><\/svg><div>${p.name}</div></div>`).join('')}</div><script>${state.products.map((p,i) => `JsBarcode("#barcode${i}","${p.barcode}",{width:2,height:50});`).join('')}<\/script></body></html>`);
                w.document.close();
                setTimeout(() => w.print(), 1000);
            };
        }

        // ========== ÜRÜN FOTOĞRAFI ==========
        function renderImage(screen) {
            screen.innerHTML = `
                <div class="grid-2">${state.products.map(p => `
                    <div style="background: ${theme.card}; padding: 8px; border-radius: 6px; border-left: 3px solid ${theme.primary};">
                        <div style="width: 100%; height: 80px; background: ${theme.background}; border-radius: 4px; display: flex; align-items: center; justify-content: center; margin-bottom: 6px; font-size: 20px; overflow: hidden;">
                            ${p.image64 ? `<img src="${p.image64}" style="width: 100%; height: 100%; object-fit: cover;" />` : p.emoji}
                        </div>
                        <div style="font-weight: bold; color: ${theme.primary}; margin-bottom: 6px; font-size: 11px;">${p.name}</div>
                        <label for="img-${p.id}" style="display: block; width: 100%; padding: 4px; background: ${theme.primary}; color: white; border-radius: 3px; cursor: pointer; text-align: center; font-size: 10px; font-weight: bold; margin-bottom: 4px;">📤 Yükle</label>
                        ${p.image64 ? `<button onclick="removeImage(${p.id})" style="width: 100%; padding: 4px; background: ${theme.error}20; color: ${theme.error}; border: none; border-radius: 3px; cursor: pointer; font-size: 10px;">🗑️ Sil</button>` : ''}
                        <input type="file" id="img-${p.id}" accept="image/*" style="display: none;" onchange="uploadImage(${p.id}, this)" />
                    </div>
                `).join('')}</div>
            `;

            window.uploadImage = function(id, input) {
                const file = input.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const p = state.products.find(x => x.id === id);
                        if (p) p.image64 = e.target.result;
                        saveData();
                        renderImage(screen);
                        alert('✅ Fotoğraf yüklendi!');
                    };
                    reader.readAsDataURL(file);
                }
            };

            window.removeImage = function(id) {
                const p = state.products.find(x => x.id === id);
                if (p && confirm('Fotoğrafı sil?')) {
                    p.image64 = null;
                    saveData();
                    renderImage(screen);
                    alert('✅ Fotoğraf silindi!');
                }
            };
        }

        // ========== STOK HAREKETİ LOGU ==========
        function renderStockLog(screen) {
            screen.innerHTML = `
                <div class="card" style="border-left: 3px solid ${theme.primary};">
                    <div style="font-size: 12px; font-weight: bold; color: ${theme.primary}; margin-bottom: 8px;">📋 Stok Hareketi</div>
                    <div id="stock-log-list"></div>
                </div>
            `;

            const list = document.getElementById('stock-log-list');
            if (state.stockLog.length === 0) {
                list.innerHTML = `<div style="text-align: center; color: ${theme.textLight}; font-size: 11px;">📭 Hareket yok</div>`;
                return;
            }

            list.innerHTML = state.stockLog.map(log => `
                <div style="background: ${theme.card}; padding: 8px; border-radius: 4px; margin-bottom: 6px; border-left: 3px solid ${log.type === 'in' ? theme.success : theme.error}; font-size: 10px;">
                    <div style="font-weight: bold; color: ${theme.primary};">${log.productName}</div>
                    <div style="color: ${log.type === 'in' ? theme.success : theme.error};">${log.type === 'in' ? '📈 Giriş' : '📉 Çıkış'}: ${log.quantity} Adet</div>
                    <div style="color: ${theme.textLight};">📅 ${log.date} | Kullanıcı: ${log.user}</div>
                    <div style="color: ${theme.textLight};">Not: ${log.note}</div>
                </div>
            `).join('');
        }

        // ========== KASA YÖNETİMİ ==========
        function renderCashManagement(screen) {
            screen.innerHTML = `
                <div class="card" style="border-left: 3px solid ${theme.primary};">
                    <div style="font-size: 12px; font-weight: bold; color: ${theme.primary}; margin-bottom: 8px;">🏧 Kasa Yönetimi</div>
                    
                    <div style="background: ${theme.background}; padding: 10px; border-radius: 4px; margin-bottom: 12px; text-align: center;">
                        <div style="font-size: 10px; color: ${theme.textLight};">💵 Kasa Bakiyesi</div>
                        <div style="font-size: 20px; font-weight: bold; color: ${theme.success};">${state.cashLog.reduce((s, c) => s + (c.type === 'in' ? c.amount : -c.amount), 0).toFixed(0)}₺</div>
                    </div>

                    <div style="grid-template-columns: 1fr 1fr; display: grid; gap: 8px; margin-bottom: 12px;">
                        <div>
                            <label style="font-size: 9px; font-weight: bold;">Tutar</label>
                            <input id="cash-amount" type="number" placeholder="0" style="width: 100%; padding: 6px; border-radius: 4px; border: 1px solid ${theme.primary}; font-size: 11px;" />
                        </div>
                        <div>
                            <label style="font-size: 9px; font-weight: bold;">İşlem</label>
                            <select id="cash-type" style="width: 100%; padding: 6px; border-radius: 4px; border: 1px solid ${theme.primary}; font-size: 11px;">
                                <option value="in">💰 Giriş</option>
                                <option value="out">💸 Çıkış</option>
                            </select>
                        </div>
                    </div>

                    <input id="cash-note" placeholder="Not" style="width: 100%; padding: 6px; border-radius: 4px; border: 1px solid ${theme.primary}; margin-bottom: 8px; font-size: 11px;" />
                    <button onclick="saveCashLog()" style="width: 100%; padding: 8px; background: ${theme.success}; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 11px;">✅ Kaydet</button>
                </div>

                <div id="cash-log-list" style="margin-top: 12px;"></div>
            `;

            window.saveCashLog = function() {
                const amount = parseFloat(document.getElementById('cash-amount').value);
                const type = document.getElementById('cash-type').value;
                const note = document.getElementById('cash-note').value;

                if (!amount) { alert('⚠️ Tutar girin!'); return; }

                state.cashLog.push({
                    id: Date.now(),
                    type: type,
                    amount: amount,
                    note: note,
                    date: new Date().toLocaleString('tr-TR'),
                    user: state.user.name
                });

                saveData();
                renderCashManagement(screen);
                alert('✅ İşlem kaydedildi!');
            };

            const list = document.getElementById('cash-log-list');
            list.innerHTML = state.cashLog.slice().reverse().map(log => `
                <div style="background: ${theme.card}; padding: 8px; border-radius: 4px; margin-bottom: 6px; border-left: 3px solid ${log.type === 'in' ? theme.success : theme.error};">
                    <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 11px;">
                        <div>${log.type === 'in' ? '💰 Giriş' : '💸 Çıkış'}</div>
                        <div style="color: ${log.type === 'in' ? theme.success : theme.error};">${log.amount.toFixed(0)}₺</div>
                    </div>
                    <div style="font-size: 9px; color: ${theme.textLight}; margin-top: 4px;">${log.note} | ${log.date}</div>
                </div>
            `).join('');
        }

        // ========== BİLDİRİMLER ==========
        function renderNotifications(screen) {
            screen.innerHTML = `
                <div class="card" style="border-left: 3px solid ${theme.primary};">
                    <div style="font-size: 12px; font-weight: bold; color: ${theme.primary}; margin-bottom: 8px;">🔔 Bildirimler</div>
                    
                    <div style="margin-bottom: 12px;">
                        <label style="font-size: 10px; font-weight: bold;">SMS - Kullanıcı Seç</label>
                        <select id="sms-user" style="width: 100%; padding: 6px; border-radius: 4px; border: 1px solid ${theme.primary}; margin-bottom: 6px; font-size: 11px;" onchange="updateSMSInfo()">
                            <option value="">- Kullanıcı Seç -</option>
                            ${state.users.map(u => `<option value="${u.id}">${u.name} (${u.username})</option>`).join('')}
                        </select>
                        <input id="sms-phone" placeholder="Telefon" readonly style="width: 100%; padding: 6px; border-radius: 4px; border: 1px solid ${theme.textLight}; background: ${theme.background}; margin-bottom: 8px; font-size: 11px;" />
                        <input id="sms-text" placeholder="SMS metni..." style="width: 100%; padding: 6px; border-radius: 4px; border: 1px solid ${theme.primary}; margin-bottom: 8px; font-size: 11px;" />
                        <button onclick="sendSMS()" style="width: 100%; padding: 6px; background: ${theme.success}; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 11px;">📲 SMS Gönder</button>
                    </div>

                    <div style="margin-bottom: 12px; border-top: 1px solid ${theme.textLight}; padding-top: 12px;">
                        <label style="font-size: 10px; font-weight: bold;">Email - Kullanıcı Seç</label>
                        <select id="email-user" style="width: 100%; padding: 6px; border-radius: 4px; border: 1px solid ${theme.primary}; margin-bottom: 6px; font-size: 11px;" onchange="updateEmailInfo()">
                            <option value="">- Kullanıcı Seç -</option>
                            ${state.users.map(u => `<option value="${u.id}">${u.name} (${u.username})</option>`).join('')}
                        </select>
                        <input id="email-addr" placeholder="E-Posta" readonly style="width: 100%; padding: 6px; border-radius: 4px; border: 1px solid ${theme.textLight}; background: ${theme.background}; margin-bottom: 8px; font-size: 11px;" />
                        <input id="email-text" placeholder="Email metni..." style="width: 100%; padding: 6px; border-radius: 4px; border: 1px solid ${theme.primary}; margin-bottom: 8px; font-size: 11px;" />
                        <button onclick="sendEmail()" style="width: 100%; padding: 6px; background: ${theme.info}; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 11px;">📧 Email Gönder</button>
                    </div>
                </div>
            `;

            window.updateSMSInfo = function() {
                const userId = parseInt(document.getElementById('sms-user').value);
                const user = state.users.find(u => u.id === userId);
                document.getElementById('sms-phone').value = user ? (user.phone || '') : '';
            };

            window.updateEmailInfo = function() {
                const userId = parseInt(document.getElementById('email-user').value);
                const user = state.users.find(u => u.id === userId);
                document.getElementById('email-addr').value = user ? (user.email || '') : '';
            };

            window.sendSMS = function() {
                const text = document.getElementById('sms-text').value;
                const phone = document.getElementById('sms-phone').value;
                if (!text) { alert('⚠️ Mesaj yazın!'); return; }
                if (!phone) { alert('⚠️ Telefon numarası seçin!'); return; }
                state.notifications.push({ type: 'sms', text: text, phone: phone, date: new Date().toLocaleString('tr-TR') });
                saveData();
                alert(`✅ SMS gönderildi! (${phone})`);
                document.getElementById('sms-text').value = '';
                document.getElementById('sms-user').value = '';
                document.getElementById('sms-phone').value = '';
            };

            window.sendEmail = function() {
                const text = document.getElementById('email-text').value;
                const email = document.getElementById('email-addr').value;
                if (!text) { alert('⚠️ Mesaj yazın!'); return; }
                if (!email) { alert('⚠️ E-posta adı seçin!'); return; }
                state.notifications.push({ type: 'email', text: text, email: email, date: new Date().toLocaleString('tr-TR') });
                saveData();
                alert(`✅ Email gönderildi! (${email})`);
                document.getElementById('email-text').value = '';
                document.getElementById('email-user').value = '';
                document.getElementById('email-addr').value = '';
            };
        }

        // ========== TEMA SEÇİMİ ==========
        function renderTheme(screen) {
            screen.innerHTML = `
                <div class="grid-2">
                    ${Object.keys(themes).map(key => `
                        <div style="background: ${themes[key].card}; padding: 12px; border-radius: 8px; border: 2px solid ${theme.name === themes[key].name ? themes[key].primary : '#ccc'}; cursor: pointer; text-align: center;" onclick="changeTheme('${key}')">
                            <div style="font-size: 24px; margin-bottom: 6px;">●</div>
                            <div style="font-weight: bold; color: ${themes[key].primary}; font-size: 12px;">${themes[key].name}</div>
                            <div style="font-size: 10px; color: ${themes[key].textLight}; margin-top: 4px;">Seç</div>
                        </div>
                    `).join('')}
                </div>
            `;

            window.changeTheme = function(themeName) {
                theme = themes[themeName];
                try { localStorage.setItem('theme', themeName); } catch(e) {}
                render();
            };
        }

        // ========== BACKUP ==========
        function renderBackup(screen) {
            screen.innerHTML = `
                <div class="card" style="border-left: 3px solid ${theme.success};">
                    <div style="font-size: 12px; font-weight: bold; color: ${theme.success}; margin-bottom: 8px;">💾 Yedek Oluştur</div>
                    <button onclick="downloadBackup()" style="width: 100%; padding: 8px; background: ${theme.success}; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px;">📥 İndir</button>
                </div>

                <div class="card" style="border-left: 3px solid ${theme.info};">
                    <div style="font-size: 12px; font-weight: bold; color: ${theme.info}; margin-bottom: 8px;">📤 Geri Yükle</div>
                    <input type="file" id="backup-file" accept=".json" style="width: 100%; padding: 6px; margin-bottom: 8px;" />
                    <button onclick="uploadBackup()" style="width: 100%; padding: 8px; background: ${theme.info}; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px;">📤 Yükle</button>
                </div>
            `;

            window.downloadBackup = function() {
                const json = JSON.stringify(state, null, 2);
                const blob = new Blob([json], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `CagdasPetShop_${new Date().toLocaleDateString('tr-TR')}.json`;
                a.click();
            };

            window.uploadBackup = function() {
                const file = document.getElementById('backup-file').files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        Object.assign(state, data);
                        saveData();
                        alert('✅ Veriler geri yüklendi!');
                        render();
                    } catch (err) {
                        alert('❌ Dosya okunamadı!');
                    }
                };
                reader.readAsText(file);
            };
        }

        // ========== START ==========
        render();
    </script>
</body>
</html>
